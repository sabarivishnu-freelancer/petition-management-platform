<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Petition App - Register</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/style.css">
  </head>
  <body>
    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">
      <div class="glass-container fade-in-up">
        <div class="text-center mb-4">
          <i class="fas fa-user-plus fa-3x text-primary mb-3"></i>
          <h2 class="font-weight-bold text-white">Join Our Community</h2>
          <p class="text-white-50">Create your account to start petitioning</p>
        </div>
        <form id="registerForm">
          <div class="form-group-modern">
            <label for="username" class="text-white">
              <i class="fas fa-user mr-2"></i>Username
            </label>
            <input type="text" class="form-control-modern" id="username" required placeholder="Choose a username">
          </div>
          <div class="form-group-modern">
            <label for="email" class="text-white">
              <i class="fas fa-envelope mr-2"></i>Email Address
            </label>
            <input type="email" class="form-control-modern" id="email" required placeholder="Enter your email">
          </div>
          <div class="form-group-modern">
            <label for="password" class="text-white">
              <i class="fas fa-lock mr-2"></i>Password
            </label>
            <input type="password" class="form-control-modern" id="password" required placeholder="Create a password">
          </div>
          <div class="form-group-modern">
            <label for="role" class="text-white">
              <i class="fas fa-user-tag mr-2"></i>Account Type
            </label>
            <select class="form-control-modern" id="role">
              <option value="student">Student</option>
              <option value="admin">Administrator</option>
            </select>
          </div>
          <button type="submit" class="btn btn-modern btn-block">
            <i class="fas fa-rocket mr-2"></i>Create Account
          </button>
        </form>
        <div class="text-center mt-4">
          <p class="text-white-50 mb-0">Already have an account?</p>
          <a href="index.html" class="text-white font-weight-bold">
            <i class="fas fa-sign-in-alt mr-1"></i>Sign In
          </a>
        </div>
        <div id="error" class="alert alert-danger mt-3" style="display:none;"></div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
      import { getAuth, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
      import { getDatabase, ref, set } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js';

      const firebaseConfig = {
        apiKey: "AIzaSyCEVmyr1QvEXFoqQ87MfaEJnq7fShAe5jk",
        authDomain: "petition-2c9af.firebaseapp.com",
        databaseURL: "https://petition-2c9af-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "petition-2c9af",
        storageBucket: "petition-2c9af.firebasestorage.app",
        messagingSenderId: "622363729755",
        appId: "1:622363729755:web:a26993e00eb1437b4f447e"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth();
      const db = getDatabase();
      const errorBox = document.getElementById('error');

      const showError = (message) => {
        errorBox.textContent = message;
        errorBox.style.display = 'block';
      };

      document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        errorBox.style.display = 'none';
        if (!navigator.onLine) {
          showError('No internet connection. Please check your network and try again.');
          return;
        }

        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const role = document.getElementById('role').value;
        try {
          const userCredential = await createUserWithEmailAndPassword(auth, email, password);
          const user = userCredential.user;
          await set(ref(db, 'users/' + user.uid), {
            username: username,
            email: email,
            role: role
          });
          window.location.href = 'index.html';
        } catch (error) {
          if (error.code === 'auth/network-request-failed') {
            showError('Unable to connect to Firebase. Check your internet connection and try again.');
          } else {
            showError(error.message || 'An unexpected registration error occurred.');
          }
        }
      });
    </script>
  </body>
</html>
