<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 - Page Not Found</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/style.css">
    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #ffffff;
      }
      .error-card {
        max-width: 720px;
        width: 100%;
        background: rgba(255,255,255,0.14);
        border: 1px solid rgba(255,255,255,0.28);
        box-shadow: 0 30px 80px rgba(0,0,0,0.18);
        border-radius: 2rem;
        backdrop-filter: blur(20px);
        padding: 3rem;
        text-align: center;
      }
      .error-card h1 {
        font-size: 5rem;
        margin-bottom: 1rem;
      }
      .error-card p {
        font-size: 1.1rem;
        color: rgba(255,255,255,0.8);
      }
      .error-card .btn-modern {
        background: linear-gradient(135deg, #22c55e, #4ade80);
        color: #ffffff;
      }
      .error-card .code-block {
        margin: 1.5rem auto;
        display: inline-flex;
        background: rgba(255,255,255,0.1);
        color: #f8fafc;
        padding: 0.85rem 1rem;
        border-radius: 1rem;
        font-family: 'Inter', sans-serif;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="error-card">
      <i class="fas fa-exclamation-triangle fa-4x mb-4"></i>
      <h1>404</h1>
      <h3 class="mb-3">Page Not Found</h3>
      <p>This page does not exist or it may have been moved. Use the link below to return to the petition portal.</p>
      <div class="code-block">/404.html</div>
      <div class="mt-4">
        <a href="/" class="btn btn-modern btn-lg">
          <i class="fas fa-home mr-2"></i>Go Back Home
        </a>
      </div>
    </div>
  </body>
</html>
