services:
  - type: web
    name: petition-management-platform
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: petition-db
          property: connectionString
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        value: adminpass
      - key: ADMIN_EMAIL
        value: admin@example.com

databases:
  - name: petition-db
    databaseName: petition
    plan: free
    postgresMajorVersion: 16
