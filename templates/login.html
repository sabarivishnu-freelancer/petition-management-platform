<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
    <title>Login - Petition System</title>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card fade-in">
        <div class="text-center mb-4">
          <span class="tag-pill">Secure Portal</span>
          <h4>Welcome Back</h4>
          <p class="muted">Sign in to manage petitions, review progress, and support meaningful change.</p>
        </div>
        {% if error %}
        <div class="alert alert-danger fade-in">{{ error }}</div>
        {% endif %}
        <form method="post">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input name="username" id="username" class="form-control" placeholder="Enter your username" required autofocus>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input name="password" type="password" id="password" class="form-control" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="btn btn-modern w-100 mb-3">Sign In</button>
          <div class="auth-divider">Don't have an account?</div>
          <a href="/register" class="btn btn-outline-secondary w-100">Create Account</a>
        </form>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
