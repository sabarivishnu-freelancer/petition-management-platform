<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
    <title>Register - Petition System</title>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card fade-in">
        <div class="text-center mb-4">
          <span class="tag-pill">Join the Platform</span>
          <h4>Create Account</h4>
          <p class="muted">Set up your workspace and start creating or supporting petitions in minutes.</p>
        </div>
        {% if error %}
        <div class="alert alert-danger fade-in">{{ error }}</div>
        {% endif %}
        <form method="post">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input name="username" id="username" class="form-control" placeholder="Choose a unique username" required autofocus>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input name="email" type="email" id="email" class="form-control" placeholder="your@email.com">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input name="password" type="password" id="password" class="form-control" placeholder="Create a strong password" required>
          </div>
          <div class="mb-3">
            <label for="role" class="form-label">Account Type</label>
            <select name="role" id="role" class="form-select">
              <option value="student" selected>👨‍🎓 Student</option>
              <option value="admin">🔐 Administrator</option>
            </select>
          </div>
          <button type="submit" class="btn btn-modern w-100 mb-3">Create Account</button>
          <div class="auth-divider">Already have an account?</div>
          <a href="/" class="btn btn-outline-secondary w-100">Sign In</a>
        </form>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
